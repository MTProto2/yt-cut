name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push cancels an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: miniapp/package-lock.json

      - name: Install deps
        working-directory: miniapp
        run: npm ci

      # Custom domain serves the app at the root, so override Vite's base ('/miniapp/').
      - name: Build
        working-directory: miniapp
        run: npm run build -- --base=/
        env:
          VITE_YT_HLS_URL: https://clip.xync.net:443

      - uses: actions/upload-pages-artifact@v3
        with:
          path: miniapp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
