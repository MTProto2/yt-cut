server {
    listen 8080;
    root /usr/share/nginx/html;
    # Plain relative Location header — an absolute one would leak nginx's
    # in-container listen port instead of whatever port/host it's reached on
    # (Docker port-mapping, a reverse proxy, etc).
    absolute_redirect off;

    location = / {
        return 302 /miniapp/;
    }

    location /miniapp/ {
        try_files $uri $uri/ /miniapp/index.html;
    }
}
